name: Fetch Copilot Report

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  fetch-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install jq

      - name: Call GitHub Copilot Metrics API
        run: |
          curl -H "Accept: application/vnd.github+json" \
               -H "Authorization: Bearer ${{ secrets.COPILOT_METRICS_TOKEN }}" \
               -H "X-GitHub-Api-Version: 2022-11-28" \
               https://api.github.com/enterprises/vtpl-xen/copilot/metrics/reports/users-28-day/latest \
               -o metrics.json

      - name: Extract download link
        run: |
          if [ ! -f metrics.json ]; then
            echo "metrics.json not found"
            exit 1
          fi

          DOWNLOAD_URL=$(jq -r '.download_links[0]' metrics.json)
      
          if [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Download URL is null"
            cat metrics.json
            exit 1
          fi

          curl "$DOWNLOAD_URL" -o report.json

      - name: Commit report file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add report.json
          git commit -m "Daily report update" || echo "No changes"
          git push
